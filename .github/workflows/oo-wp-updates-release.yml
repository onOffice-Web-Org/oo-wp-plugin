name: onOffice WP-Updates Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  get-version:
    name: Get current version
    runs-on: ubuntu-latest
    outputs:
      currentVersion: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Get version
        id: get-version
        # For test runs via workflow_dispatch on a branch we don't have a v* tag,
        # so fall back to a placeholder version.
        run: |
          VERSION="$(echo ${{ github.ref_name }} | sed -n 's/v\(\)/\1/p')"
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0-test"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  # build:
  #   name: Build release
  #   needs: get-version
  #   uses: ./.github/workflows/build-release.yml
  #   with:
  #     expectedVersion: ${{ needs.get-version.outputs.currentVersion }}
  #     pluginFolder: onoffice-for-wp-websites

  deploy:
    name: Deploy to Update Server
    runs-on: ubuntu-latest
    needs: [get-version]
    steps:
      - name: Checkout source (for readme.txt)
        uses: actions/checkout@v4
        with:
          path: source

      # - name: Download release artifact
      #   uses: actions/download-artifact@v4.1.7
      #   with:
      #     name: release

      - name: Extract metadata from readme.txt
        id: readme-meta
        run: |
          README="source/readme.txt"
          if [ ! -f "$README" ]; then
            echo "readme.txt not found at $README" >&2
            exit 1
          fi

          # Read the standard WordPress plugin readme headers. They look like:
          #   Requires PHP: 8.2
          #   Requires at least: 6.1
          #   Tested up to: 6.9
          extract() {
            grep -i -m1 "^$1:" "$README" | sed -E "s/^[^:]+:[[:space:]]*//" | tr -d '\r' | xargs
          }

          REQUIRES_PHP="$(extract 'Requires PHP')"
          REQUIRES_WP="$(extract 'Requires at least')"
          TESTED_WP="$(extract 'Tested up to')"

          if [ -z "$REQUIRES_PHP" ]; then
            echo "Could not parse 'Requires PHP' from readme.txt" >&2
            exit 1
          fi

          echo "requires_php=$REQUIRES_PHP" >> $GITHUB_OUTPUT
          echo "requires=$REQUIRES_WP"     >> $GITHUB_OUTPUT
          echo "tested=$TESTED_WP"         >> $GITHUB_OUTPUT

          echo "Parsed: requires_php=$REQUIRES_PHP requires=$REQUIRES_WP tested=$TESTED_WP"

      - name: Deployment final release json Updater File
        id: create-json
        uses: jsdaniell/create-json@v1.2.2
        with:
          name: "updater.json"
          json: '{"version":"${{ needs.get-version.outputs.currentVersion }}","download_url":"https://onoffice-wp-updates.de/releases/plugins/oo-wp-plugin/release.zip","requires_php":"${{ steps.readme-meta.outputs.requires_php }}","requires":"${{ steps.readme-meta.outputs.requires }}","tested":"${{ steps.readme-meta.outputs.tested }}"}'

      - name: Upload release build
        uses: actions/upload-artifact@v4
        with:
          name: oo-wp-plugin Release Bundle
          path: |
            updater.json
          retention-days: 7

      # - name: Set SSH Key for Raidboxes Server
      #   uses: webfactory/ssh-agent@v0.9.0
      #   with:
      #     ssh-private-key: ${{ secrets.SSH_KEY_RAIDBOXES }}

      # - name: Upload Files to Release Server
      #   run: rsync -e 'ssh -o StrictHostKeyChecking=no' release.zip updater.json b13zphemyrdbxio@b13zphe.ssh.myrdbx.io:~/www/releases/plugins/oo-wp-plugin